_base_: ../base.yaml

exp_name: qwen_grpo_v1

data:
  train_path: data/processed/LIAR-RAW/train.json
  val_path: data/processed/LIAR-RAW/val.json
  test_path: data/processed/LIAR-RAW/test.json
  num_workers: 0
  max_evidence: null

model:
  name_or_path: models/Qwen3-0.6B/

optimizer:
  lr: 5.0e-6

sft:
  enabled: false
  epochs: 1
  batch_size: 8
  grad_accum_steps: 1
  max_length: 512

grpo:
  enabled: true
  epochs: 2
  batch_size: 8
  group_size: 8
  num_update_epochs: 4
  clip_eps: 0.2
  kl_beta: 0.0
  use_ref_model: false
  max_prompt_length: 512
  max_new_tokens: 256

eval:
  every_n_steps: 500
  max_new_tokens: 256

reward:
  label_correct: 1.0
  format_correct: 0.2
  explanation_overlap: 0.1

prompt:
  name: default_veracity_prompt
  require_format: true
  extras: {"top_k_evidence": 5}

runtime:
  bf16: true

experimental:
  note: "first larger model run"

logging:
  level: DEBUG
  swanlab_enabled: true
  swanlab_project: "grpo-veracity"
  swanlab_tags: ["grpo","qwen","liar"]
  swanlab_group: "qwen-0.6b"
  swanlab_experiment_name: "qwen_grpo_v1"
  swanlab_description: "First run of GRPO with Qwen-0.6B on the LIAR-RAW dataset. Using 1 epoch of SFT followed by 2 epochs of GRPO. Reward based on label correctness, format correctness, and explanation overlap."